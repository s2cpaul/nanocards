name: Deploy Supabase Edge Function

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-function:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install supabase CLI
        run: npm install -g supabase

      - name: Deploy make-server-d91f8206 function
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Deploying Supabase function make-server-d91f8206 to project $SUPABASE_PROJECT_REF"
          supabase functions deploy make-server-d91f8206 --project-ref $SUPABASE_PROJECT_REF --token $SUPABASE_TOKEN
